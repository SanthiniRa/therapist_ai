<!DOCTYPE html>
<html>
<head>
<title>Therapist AI Login</title>

<style>
body{
font-family: Arial;
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:black;
padding:30px;
border-radius:10px;
width:300px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:#4a6fa5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#395785;
}
</style>

</head>

<body>

<div class="container">

<h2>Therapist AI</h2>

<form method="POST" action="/login">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
